<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>尚婴坊体温记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            min-height: 100vh;
            touch-action: manipulation;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .temp-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            active: scale: 0.95;
        }
        
        .temp-btn:active {
            transform: scale(0.95);
        }
        
        .record-item {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fever-high { color: #e74c3c; }
        .fever-mid { color: #e67e22; }
        .fever-low { color: #f39c12; }
        .normal { color: #27ae60; }
        
        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        .shop-header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            box-shadow: 0 4px 20px rgba(238, 90, 111, 0.3);
        }
        
        .phone-btn {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
        }
        
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Shop Header -->
    <div class="shop-header text-white px-4 py-4 mb-6">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-2xl">👶</div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">尚婴坊全球购</h1>
                    <p class="text-xs opacity-90">专业母婴 · 贴心服务</p>
                </div>
            </div>
            <a href="tel:15106666102" class="phone-btn px-4 py-2 rounded-full text-sm font-bold flex items-center gap-1 active:scale-95 transition-transform">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                服务热线
            </a>
        </div>
    </div>

    <div class="px-4">
        <!-- Main Title -->
        <div class="max-w-md mx-auto mb-6 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full shadow-lg mb-3 relative">
                <div class="pulse-ring bg-red-400 w-full h-full"></div>
                <span class="text-3xl relative z-10">🌡️</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-1">宝宝体温记录</h2>
            <p class="text-sm text-gray-600">简单记录，安心守护</p>
        </div>

        <!-- Main Input Card -->
        <div class="max-w-md mx-auto glass-panel rounded-3xl shadow-xl p-6 mb-6">
            
            <!-- Temperature Display -->
            <div class="text-center mb-6">
                <div class="text-6xl font-bold text-gray-800 mb-2 tracking-tighter" id="tempDisplay">37.0</div>
                <div class="text-gray-500 font-medium">°C</div>
            </div>

            <!-- Quick Buttons -->
            <div class="grid grid-cols-4 gap-3 mb-6">
                <button onclick="adjustTemp(-0.5)" class="temp-btn bg-gray-100 hover:bg-gray-200 rounded-2xl py-3 text-xl font-bold text-gray-600">-0.5</button>
                <button onclick="adjustTemp(-0.1)" class="temp-btn bg-gray-100 hover:bg-gray-200 rounded-2xl py-3 text-xl font-bold text-gray-600">-0.1</button>
                <button onclick="adjustTemp(0.1)" class="temp-btn bg-orange-100 hover:bg-orange-200 rounded-2xl py-3 text-xl font-bold text-orange-600">+0.1</button>
                <button onclick="adjustTemp(0.5)" class="temp-btn bg-orange-100 hover:bg-orange-200 rounded-2xl py-3 text-xl font-bold text-orange-600">+0.5</button>
            </div>

            <!-- Status Indicator -->
            <div id="statusBadge" class="text-center mb-4 py-2 px-4 rounded-full bg-green-100 text-green-700 font-bold text-sm inline-block w-full">
                正常体温
            </div>

            <!-- Note Input -->
            <div class="mb-4">
                <input type="text" id="noteInput" placeholder="备注：吃药了、睡着了、精神好..." 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange-400 focus:outline-none text-gray-700 bg-gray-50">
            </div>

            <!-- Save Button -->
            <button onclick="saveRecord()" 
                class="w-full bg-gradient-to-r from-orange-400 to-red-400 hover:from-orange-500 hover:to-red-500 text-white font-bold py-4 rounded-2xl shadow-lg transform transition hover:scale-[1.02] active:scale-95 text-lg">
                记录体温
            </button>
        </div>

        <!-- Stats Summary -->
        <div class="max-w-md mx-auto grid grid-cols-3 gap-3 mb-6">
            <div class="glass-panel rounded-2xl p-3 text-center">
                <div class="text-xs text-gray-500 mb-1">最高温</div>
                <div class="text-lg font-bold text-red-500" id="maxTemp">--</div>
            </div>
            <div class="glass-panel rounded-2xl p-3 text-center">
                <div class="text-xs text-gray-500 mb-1">记录次数</div>
                <div class="text-lg font-bold text-blue-500" id="recordCount">0</div>
            </div>
            <div class="glass-panel rounded-2xl p-3 text-center">
                <div class="text-xs text-gray-500 mb-1">最近</div>
                <div class="text-lg font-bold text-gray-700" id="lastTime">--</div>
            </div>
        </div>

        <!-- History List -->
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3 px-2">
                <h3 class="text-lg font-bold text-gray-800">记录历史</h3>
                <button onclick="clearAll()" class="text-xs text-red-400 hover:text-red-600 font-medium">清空记录</button>
            </div>
            
            <div id="historyList" class="space-y-3 pb-20">
                <div class="text-center text-gray-400 py-8 text-sm" id="emptyState">
                    还没有记录，快添加第一条体温吧
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Contact -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-4 py-3 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🏪</span>
                <div>
                    <div class="font-bold text-gray-800 text-sm">尚婴坊全球购</div>
                    <div class="text-xs text-gray-500">专业母婴用品</div>
                </div>
            </div>
            <a href="tel:15106666102" class="flex items-center gap-2 bg-gradient-to-r from-green-400 to-teal-500 text-white px-4 py-2 rounded-full font-bold text-sm active:scale-95 transition-transform">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                15106666102
            </a>
        </div>
    </div>

    <script>
        let currentTemp = 37.0;
        let records = JSON.parse(localStorage.getItem('tempRecords') || '[]');
        
        // Initialize
        updateDisplay();
        renderHistory();
        updateStats();

        function adjustTemp(delta) {
            currentTemp = Math.round((currentTemp + delta) * 10) / 10;
            if (currentTemp < 35) currentTemp = 35;
            if (currentTemp > 42) currentTemp = 42;
            updateDisplay();
        }

        function updateDisplay() {
            const display = document.getElementById('tempDisplay');
            display.textContent = currentTemp.toFixed(1);
            
            const badge = document.getElementById('statusBadge');
            
            if (currentTemp >= 39) {
                display.className = 'text-6xl font-bold fever-high mb-2 tracking-tighter';
                badge.className = 'text-center mb-4 py-2 px-4 rounded-full bg-red-100 text-red-700 font-bold text-sm inline-block w-full';
                badge.textContent = '⚠️ 高烧，建议就医';
            } else if (currentTemp >= 38) {
                display.className = 'text-6xl font-bold fever-mid mb-2 tracking-tighter';
                badge.className = 'text-center mb-4 py-2 px-4 rounded-full bg-orange-100 text-orange-700 font-bold text-sm inline-block w-full';
                badge.textContent = '🔥 中度发烧';
            } else if (currentTemp >= 37.3) {
                display.className = 'text-6xl font-bold fever-low mb-2 tracking-tighter';
                badge.className = 'text-center mb-4 py-2 px-4 rounded-full bg-yellow-100 text-yellow-700 font-bold text-sm inline-block w-full';
                badge.textContent = '⚡ 低烧，注意观察';
            } else {
                display.className = 'text-6xl font-bold normal mb-2 tracking-tighter';
                badge.className = 'text-center mb-4 py-2 px-4 rounded-full bg-green-100 text-green-700 font-bold text-sm inline-block w-full';
                badge.textContent = '✅ 正常体温';
            }
        }

        function saveRecord() {
            const note = document.getElementById('noteInput').value;
            const record = {
                id: Date.now(),
                temp: currentTemp,
                time: new Date(),
                note: note
            };
            
            records.unshift(record);
            localStorage.setItem('tempRecords', JSON.stringify(records));
            
            // Reset note
            document.getElementById('noteInput').value = '';
            
            // Visual feedback
            const btn = document.querySelector('button[onclick="saveRecord()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✓ 已保存';
            btn.classList.add('bg-green-500');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('bg-green-500');
            }, 1000);
            
            renderHistory();
            updateStats();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const emptyState = document.getElementById('emptyState');
            
            if (records.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 py-8 text-sm" id="emptyState">还没有记录，快添加第一条体温吧</div>';
                return;
            }
            
            list.innerHTML = records.map(record => {
                const date = new Date(record.time);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                
                let tempColor = 'text-green-600';
                let bgColor = 'bg-green-50';
                if (record.temp >= 39) {
                    tempColor = 'text-red-600';
                    bgColor = 'bg-red-50';
                } else if (record.temp >= 38) {
                    tempColor = 'text-orange-600';
                    bgColor = 'bg-orange-50';
                } else if (record.temp >= 37.3) {
                    tempColor = 'text-yellow-600';
                    bgColor = 'bg-yellow-50';
                }
                
                return `
                    <div class="record-item glass-panel rounded-2xl p-4 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 ${bgColor} rounded-full flex items-center justify-center">
                                <span class="text-lg font-bold ${tempColor}">${record.temp.toFixed(1)}°</span>
                            </div>
                            <div>
                                <div class="font-bold text-gray-800">${timeStr}</div>
                                ${record.note ? `<div class="text-xs text-gray-500 mt-0.5">${record.note}</div>` : ''}
                            </div>
                        </div>
                        <button onclick="deleteRecord(${record.id})" class="text-gray-300 hover:text-red-400 p-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function deleteRecord(id) {
            records = records.filter(r => r.id !== id);
            localStorage.setItem('tempRecords', JSON.stringify(records));
            renderHistory();
            updateStats();
        }

        function clearAll() {
            if (confirm('确定要清空所有记录吗？')) {
                records = [];
                localStorage.removeItem('tempRecords');
                renderHistory();
                updateStats();
            }
        }

        function updateStats() {
            if (records.length === 0) {
                document.getElementById('maxTemp').textContent = '--';
                document.getElementById('recordCount').textContent = '0';
                document.getElementById('lastTime').textContent = '--';
                return;
            }
            
            const max = Math.max(...records.map(r => r.temp));
            document.getElementById('maxTemp').textContent = max.toFixed(1) + '°';
            document.getElementById('recordCount').textContent = records.length;
            
            const last = new Date(records[0].time);
            const now = new Date();
            const diff = Math.floor((now - last) / 60000); // minutes
            
            let timeText;
            if (diff < 1) timeText = '刚刚';
            else if (diff < 60) timeText = diff + '分钟前';
            else if (diff < 1440) timeText = Math.floor(diff/60) + '小时前';
            else timeText = Math.floor(diff/1440) + '天前';
            
            document.getElementById('lastTime').textContent = timeText;
        }

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement.id === 'noteInput') {
                saveRecord();
            }
        });
    </script>
</body>
</html>
